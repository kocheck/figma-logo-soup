<!DOCTYPE html>
<html>
<head>
  <style>
    /* Figma-native theming via CSS variables provided by themeColors: true */
    :root {
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 12px;
      --spacing-lg: 16px;
      --radius: 6px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 11px;
      color: var(--figma-color-text, #333);
      background: var(--figma-color-bg, #fff);
      padding: var(--spacing-lg);
      line-height: 1.5;
      overflow-y: auto;
    }

    h2 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: var(--spacing-sm);
      color: var(--figma-color-text, #333);
    }

    .section {
      margin-bottom: var(--spacing-lg);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--spacing-sm);
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      margin-bottom: var(--spacing-xs);
      color: var(--figma-color-text-secondary, #666);
    }

    input[type="text"],
    input[type="password"],
    input[type="number"],
    textarea,
    select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid var(--figma-color-border, #ddd);
      border-radius: var(--radius);
      background: var(--figma-color-bg, #fff);
      color: var(--figma-color-text, #333);
      font-size: 11px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--figma-color-border-brand, #18a0fb);
    }

    textarea {
      resize: vertical;
      min-height: 72px;
    }

    .row {
      display: flex;
      gap: var(--spacing-sm);
    }

    .row > * {
      flex: 1;
    }

    .field {
      margin-bottom: var(--spacing-md);
    }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      width: 100%;
      background: var(--figma-color-bg-brand, #18a0fb);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      opacity: 0.9;
    }

    .btn-secondary {
      background: var(--figma-color-bg-secondary, #f0f0f0);
      color: var(--figma-color-text, #333);
      font-weight: 500;
      padding: 4px 8px;
      font-size: 10px;
    }

    .presets {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .preset-chip {
      padding: 3px 8px;
      border-radius: 12px;
      background: var(--figma-color-bg-secondary, #f0f0f0);
      color: var(--figma-color-text-secondary, #666);
      font-size: 10px;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
    }

    .preset-chip:hover {
      background: var(--figma-color-bg-hover, #e0e0e0);
      color: var(--figma-color-text, #333);
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-sm);
    }

    .checkbox-row input[type="checkbox"] {
      width: auto;
    }

    .checkbox-row label {
      margin: 0;
      cursor: pointer;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--figma-color-bg-secondary, #f0f0f0);
      border-radius: 2px;
      margin-top: var(--spacing-sm);
      overflow: hidden;
      display: none;
    }

    .progress-bar.visible {
      display: block;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--figma-color-bg-brand, #18a0fb);
      border-radius: 2px;
      transition: width 0.2s ease;
      width: 0%;
    }

    .status {
      font-size: 10px;
      color: var(--figma-color-text-secondary, #666);
      margin-top: var(--spacing-xs);
      min-height: 16px;
    }

    .status.error {
      color: var(--figma-color-text-danger, #f24822);
    }

    .status.success {
      color: var(--figma-color-text-success, #1bc47d);
    }

    .divider {
      border: none;
      border-top: 1px solid var(--figma-color-border, #eee);
      margin: var(--spacing-lg) 0;
    }

    .token-row {
      display: flex;
      gap: var(--spacing-sm);
    }

    .token-row input {
      flex: 1;
    }

    .token-row button {
      flex-shrink: 0;
    }

    .hidden {
      display: none;
    }

    /* Domain list items for drag-to-reorder */
    .domain-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-bottom: var(--spacing-sm);
    }

    .domain-item {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 6px;
      background: var(--figma-color-bg-secondary, #f5f5f5);
      border-radius: 4px;
      font-size: 11px;
      cursor: grab;
      user-select: none;
      transition: background 0.1s;
    }

    .domain-item:active {
      cursor: grabbing;
    }

    .domain-item.dragging {
      opacity: 0.5;
      background: var(--figma-color-bg-hover, #e8e8e8);
    }

    .domain-item.drag-over {
      border-top: 2px solid var(--figma-color-border-brand, #18a0fb);
    }

    .domain-item .drag-handle {
      color: var(--figma-color-text-tertiary, #aaa);
      font-size: 10px;
      flex-shrink: 0;
    }

    .domain-item .domain-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .domain-item .remove-btn {
      background: none;
      border: none;
      color: var(--figma-color-text-tertiary, #aaa);
      cursor: pointer;
      padding: 0 2px;
      font-size: 12px;
      line-height: 1;
      flex-shrink: 0;
    }

    .domain-item .remove-btn:hover {
      color: var(--figma-color-text-danger, #f24822);
    }

    .add-domain-row {
      display: flex;
      gap: 4px;
    }

    .add-domain-row input {
      flex: 1;
    }

    .add-domain-row button {
      flex-shrink: 0;
    }

    /* Loading spinner on generate button */
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-primary.loading {
      position: relative;
      pointer-events: none;
    }

    .btn-primary.loading::after {
      content: "";
      width: 12px;
      height: 12px;
      margin-left: 8px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      display: inline-block;
      vertical-align: middle;
      animation: spin 0.6s linear infinite;
    }

    /* Tooltip icon for advanced fields */
    .tooltip {
      display: inline-block;
      width: 14px;
      height: 14px;
      line-height: 14px;
      text-align: center;
      border-radius: 50%;
      background: var(--figma-color-bg-secondary, #eee);
      color: var(--figma-color-text-tertiary, #999);
      font-size: 9px;
      cursor: help;
      margin-left: 4px;
      vertical-align: middle;
    }

    /* Domain list empty state */
    .domain-list-empty {
      padding: 12px;
      text-align: center;
      color: var(--figma-color-text-tertiary, #aaa);
      font-size: 10px;
    }
  </style>
</head>
<body>
  <!-- API Token Section -->
  <div class="section">
    <h2>API Token</h2>
    <div class="token-row">
      <input
        type="password"
        id="token-input"
        placeholder="pk_..."
        autocomplete="off"
        aria-label="Logo.dev API token"
        aria-describedby="token-status"
      />
      <button class="btn-secondary" id="save-token-btn">Save</button>
    </div>
    <div class="status" id="token-status" role="status" aria-live="polite"></div>
  </div>

  <hr class="divider" />

  <!-- Domains Section -->
  <div class="section">
    <div class="section-header">
      <h2>Logos</h2>
      <button class="btn-secondary" id="clear-all-btn">Clear</button>
      <button class="btn-secondary" id="add-popular-btn">+ Popular</button>
    </div>
    <div class="field">
      <label>Domains</label>
      <div class="domain-list" id="domain-list" role="list" aria-label="Domain list">
        <!-- Populated by JS -->
      </div>
      <div class="add-domain-row">
        <input type="text" id="add-domain-input" placeholder="stripe.com" aria-label="Add domain" />
        <button class="btn-secondary" id="add-domain-btn">Add</button>
      </div>
    </div>
    <div class="presets" id="presets-container">
      <!-- Populated by JS -->
    </div>
  </div>

  <hr class="divider" />

  <!-- Grid Config Section -->
  <div class="section">
    <h2>Grid Settings</h2>
    <div class="row">
      <div class="field">
        <label for="columns-input">Columns</label>
        <input type="number" id="columns-input" value="4" min="1" max="20" />
      </div>
      <div class="field">
        <label for="base-size-input">Base Size (px)</label>
        <input type="number" id="base-size-input" value="48" min="16" max="200" />
      </div>
      <div class="field">
        <label for="gap-input">Gap (px)</label>
        <input type="number" id="gap-input" value="16" min="0" max="100" />
      </div>
    </div>
  </div>

  <!-- Logo.dev Options -->
  <div class="section">
    <h2>Logo Options</h2>
    <div class="row">
      <div class="field">
        <label for="theme-select">Theme</label>
        <select id="theme-select">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
          <option value="auto">Auto</option>
        </select>
      </div>
      <div class="field">
        <label for="format-select">Format</label>
        <select id="format-select">
          <option value="png" selected>PNG</option>
          <option value="jpg">JPG</option>
          <option value="webp">WebP</option>
        </select>
      </div>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="greyscale-check" />
      <label for="greyscale-check">Greyscale</label>
    </div>
  </div>

  <!-- Normalization Options -->
  <div class="section">
    <h2>Normalization</h2>
    <div class="row">
      <div class="field">
        <label for="scale-factor-input">Scale Factor <span class="tooltip" title="0 = same width, 1 = same height, 0.5 = balanced">?</span></label>
        <input type="number" id="scale-factor-input" value="0.5" min="0" max="1" step="0.1" />
      </div>
      <div class="field">
        <label for="density-factor-input">Density Factor <span class="tooltip" title="0 = pure aspect ratio, 1 = density dominant, 0.5 = balanced">?</span></label>
        <input type="number" id="density-factor-input" value="0.5" min="0" max="1" step="0.1" />
      </div>
    </div>
    <div class="checkbox-row">
      <input type="checkbox" id="density-aware-check" checked />
      <label for="density-aware-check">Density-Aware Scaling</label>
    </div>
    <div class="field">
      <label for="align-by-select">Align By</label>
      <select id="align-by-select">
        <option value="bounds">Bounds (geometric center)</option>
        <option value="visual-center-y" selected>Visual Center Y</option>
        <option value="visual-center-x">Visual Center X</option>
        <option value="visual-center-xy">Visual Center XY</option>
      </select>
    </div>
  </div>

  <!-- Output Options -->
  <div class="section">
    <h2>Output</h2>
    <div class="checkbox-row">
      <input type="checkbox" id="export-component-check" />
      <label for="export-component-check">Export as Figma Component</label>
    </div>
  </div>

  <hr class="divider" />

  <!-- Generate Button -->
  <button class="btn-primary" id="generate-btn">Generate Logo Soup</button>
  <div class="progress-bar" id="progress-bar">
    <div class="progress-bar-fill" id="progress-fill"></div>
  </div>
  <div class="status" id="status-text" role="status" aria-live="polite"></div>

  <!-- Hidden canvas for image analysis -->
  <canvas id="analysis-canvas" class="hidden"></canvas>

  <script>
    // ============================
    // DOM References
    // ============================
    const tokenInput = document.getElementById('token-input');
    const saveTokenBtn = document.getElementById('save-token-btn');
    const tokenStatus = document.getElementById('token-status');
    const domainList = document.getElementById('domain-list');
    const addDomainInput = document.getElementById('add-domain-input');
    const addDomainBtn = document.getElementById('add-domain-btn');
    const clearAllBtn = document.getElementById('clear-all-btn');
    const addPopularBtn = document.getElementById('add-popular-btn');
    const presetsContainer = document.getElementById('presets-container');
    const columnsInput = document.getElementById('columns-input');
    const baseSizeInput = document.getElementById('base-size-input');
    const gapInput = document.getElementById('gap-input');
    const themeSelect = document.getElementById('theme-select');
    const formatSelect = document.getElementById('format-select');
    const greyscaleCheck = document.getElementById('greyscale-check');
    const scaleFactorInput = document.getElementById('scale-factor-input');
    const densityFactorInput = document.getElementById('density-factor-input');
    const densityAwareCheck = document.getElementById('density-aware-check');
    const alignBySelect = document.getElementById('align-by-select');
    const exportComponentCheck = document.getElementById('export-component-check');
    const generateBtn = document.getElementById('generate-btn');
    const progressBar = document.getElementById('progress-bar');
    const progressFill = document.getElementById('progress-fill');
    const statusText = document.getElementById('status-text');
    const analysisCanvas = document.getElementById('analysis-canvas');
    const ctx = analysisCanvas.getContext('2d');

    // Domain list state
    let domains = [];
    const canvasLogoMap = new Map(); // domain → CanvasLogo metadata
    let appendToExisting = false;

    // Analysis cache: URL → analysis result (survives regeneration)
    const logoCache = new Map();

    // ============================
    // Popular Logo Presets
    // ============================
    const POPULAR_LOGOS = [
      'google.com', 'apple.com', 'stripe.com', 'github.com', 'figma.com',
      'slack.com', 'notion.so', 'linear.app', 'vercel.com', 'shopify.com',
      'spotify.com', 'airbnb.com', 'uber.com', 'netflix.com', 'twitch.tv',
      'discord.com', 'dropbox.com', 'zoom.us', 'mongodb.com', 'cloudflare.com',
    ];

    // Render preset chips
    POPULAR_LOGOS.forEach(domain => {
      const chip = document.createElement('button');
      chip.className = 'preset-chip';
      chip.textContent = domain.replace(/\.\w+$/, '');
      chip.onclick = () => addDomain(domain);
      presetsContainer.appendChild(chip);
    });

    // ============================
    // Domain List Management
    // ============================

    function showSelectionBanner(count) {
      const existing = document.getElementById('selection-banner');
      if (existing) existing.remove();

      const banner = document.createElement('div');
      banner.id = 'selection-banner';
      banner.style.cssText = [
        'background:var(--figma-color-bg-selected,#e8f0fe)',
        'color:var(--figma-color-text,#333)',
        'padding:8px 12px',
        'font-size:11px',
        'border-radius:4px',
        'margin-bottom:8px',
        'display:flex',
        'justify-content:space-between',
        'align-items:center',
      ].join(';');

      const text = document.createElement('span');
      text.textContent = count + ' logo' + (count === 1 ? '' : 's') + ' imported from canvas selection';

      const dismiss = document.createElement('button');
      dismiss.textContent = '\u2715';
      dismiss.setAttribute('aria-label', 'Dismiss');
      dismiss.style.cssText = 'background:none;border:none;cursor:pointer;font-size:12px;padding:0 0 0 8px;';
      dismiss.addEventListener('click', function() { banner.remove(); });

      banner.appendChild(text);
      banner.appendChild(dismiss);

      const domainSection = document.querySelector('.section-domains') || document.getElementById('domain-list');
      if (domainSection && domainSection.parentNode) {
        domainSection.parentNode.insertBefore(banner, domainSection);
      }
    }

    function renderAppendToggle() {
      let toggle = document.getElementById('append-toggle');
      if (!toggle) {
        toggle = document.createElement('div');
        toggle.id = 'append-toggle';
        toggle.setAttribute('role', 'group');
        toggle.setAttribute('aria-label', 'Grid placement');
        toggle.style.cssText = 'display:flex;gap:6px;margin-bottom:8px;';
        const generateBtn = document.getElementById('generate-btn');
        if (generateBtn && generateBtn.parentNode) {
          generateBtn.parentNode.insertBefore(toggle, generateBtn);
        }
      }
      while (toggle.firstChild) toggle.removeChild(toggle.firstChild);

      function makeBtn(label, isAppend) {
        const btn = document.createElement('button');
        btn.textContent = label;
        const active = isAppend === appendToExisting;
        btn.style.cssText = [
          'flex:1',
          'padding:4px 8px',
          'border-radius:4px',
          'cursor:pointer',
          'font-size:11px',
          'border:1px solid var(--figma-color-border,#ccc)',
          'background:' + (active ? 'var(--figma-color-bg-selected,#e8f0fe)' : 'var(--figma-color-bg,#fff)'),
          'font-weight:' + (active ? '600' : '400'),
        ].join(';');
        btn.addEventListener('click', function() {
          appendToExisting = isAppend;
          renderAppendToggle();
        });
        return btn;
      }

      toggle.appendChild(makeBtn('New grid', false));
      toggle.appendChild(makeBtn('Append to existing', true));
    }

    function renderDomainList() {
      domainList.textContent = '';

      if (domains.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'domain-list-empty';
        empty.textContent = 'No domains added yet. Type a domain below or click + Popular.';
        domainList.appendChild(empty);
        return;
      }

      domains.forEach((domain, index) => {
        const item = document.createElement('div');
        item.className = 'domain-item';
        item.draggable = true;
        item.setAttribute('role', 'listitem');
        item.setAttribute('tabindex', '0');
        item.setAttribute('aria-label', domain + ', drag to reorder');
        item.dataset.index = String(index);

        const handle = document.createElement('span');
        handle.className = 'drag-handle';
        handle.textContent = '\u2630';
        handle.setAttribute('aria-hidden', 'true');

        const name = document.createElement('span');
        name.className = 'domain-name';

        if (canvasLogoMap.has(domain)) {
          const badge = document.createElement('span');
          badge.textContent = '\u229e';
          badge.title = 'From canvas selection \u2014 no API key needed';
          badge.setAttribute('aria-label', 'Canvas logo');
          badge.style.cssText = 'font-size:9px;opacity:0.55;margin-right:4px;';
          name.insertBefore(badge, name.firstChild);
        }

        name.appendChild(document.createTextNode(domain));

        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove-btn';
        removeBtn.textContent = '\u00d7';
        removeBtn.setAttribute('aria-label', 'Remove ' + domain);
        removeBtn.dataset.index = String(index);

        item.appendChild(handle);
        item.appendChild(name);
        item.appendChild(removeBtn);

        // Drag events
        item.addEventListener('dragstart', (e) => {
          item.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', String(index));
        });
        item.addEventListener('dragend', () => {
          item.classList.remove('dragging');
          domainList.querySelectorAll('.domain-item').forEach(el =>
            el.classList.remove('drag-over')
          );
        });
        item.addEventListener('dragover', (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          item.classList.add('drag-over');
        });
        item.addEventListener('dragleave', () => {
          item.classList.remove('drag-over');
        });
        item.addEventListener('drop', (e) => {
          e.preventDefault();
          item.classList.remove('drag-over');
          const fromIndex = parseInt(e.dataTransfer.getData('text/plain'));
          const toIndex = index;
          if (fromIndex !== toIndex) {
            const [moved] = domains.splice(fromIndex, 1);
            domains.splice(toIndex, 0, moved);
            renderDomainList();
          }
        });

        // Remove button
        removeBtn.addEventListener('click', () => {
          canvasLogoMap.delete(domain);
          domains.splice(index, 1);
          renderDomainList();
        });

        // Keyboard: Delete/Backspace to remove, arrow keys to navigate
        item.addEventListener('keydown', (e) => {
          if (e.key === 'Delete' || e.key === 'Backspace') {
            e.preventDefault();
            canvasLogoMap.delete(domain);
            domains.splice(index, 1);
            renderDomainList();
            // Focus next item or input
            const nextItem = domainList.querySelector('.domain-item');
            if (nextItem) nextItem.focus();
            else addDomainInput.focus();
          } else if (e.key === 'ArrowDown' && index < domains.length - 1) {
            e.preventDefault();
            const items = domainList.querySelectorAll('.domain-item');
            if (items[index + 1]) items[index + 1].focus();
          } else if (e.key === 'ArrowUp' && index > 0) {
            e.preventDefault();
            const items = domainList.querySelectorAll('.domain-item');
            if (items[index - 1]) items[index - 1].focus();
          }
        });

        domainList.appendChild(item);
      });
    }

    function addDomain(domain) {
      const clean = domain
        .trim()
        .toLowerCase()
        .replace(/^https?:\/\//, '')
        .replace(/\/+$/, '');
      if (clean && !domains.includes(clean)) {
        domains.push(clean);
        renderDomainList();
      }
    }

    function parseDomains(input) {
      return input
        .split(/[\n,]+/)
        .map(d => d.trim().toLowerCase().replace(/^https?:\/\//, '').replace(/\/+$/, ''))
        .filter(d => d.length > 0);
    }

    // ============================
    // Utility Functions
    // ============================

    function getConfig() {
      return {
        columns: parseInt(columnsInput.value) || 4,
        baseSize: parseInt(baseSizeInput.value) || 48,
        gap: parseInt(gapInput.value) || 16,
        theme: themeSelect.value,
        greyscale: greyscaleCheck.checked,
        format: formatSelect.value,
        scaleFactor: parseFloat(scaleFactorInput.value) || 0.5,
        densityAware: densityAwareCheck.checked,
        densityFactor: parseFloat(densityFactorInput.value) || 0.5,
        exportAsComponent: exportComponentCheck.checked,
        alignBy: alignBySelect.value,
      };
    }

    function buildLogoUrl(domain, token, config) {
      const cleanDomain = domain
        .replace(/^https?:\/\//, '')
        .replace(/\/+$/, '')
        .trim()
        .toLowerCase();

      const params = new URLSearchParams({
        token: token,
        size: String(Math.min(Math.max(config.baseSize * 4, 128), 800)),
        format: config.format,
        theme: config.theme,
      });

      if (config.greyscale) {
        params.set('greyscale', 'true');
      }

      return `https://img.logo.dev/${encodeURIComponent(cleanDomain)}?${params.toString()}`;
    }

    function setStatus(text, type = '') {
      statusText.textContent = text;
      statusText.className = 'status' + (type ? ` ${type}` : '');
    }

    function setProgress(current, total) {
      if (total === 0) {
        progressBar.classList.remove('visible');
        return;
      }
      progressBar.classList.add('visible');
      const pct = Math.round((current / total) * 100);
      progressFill.style.width = `${pct}%`;
    }

    // ============================
    // Image Analysis (Canvas-based)
    // ============================

    function loadImage(url) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error(`Failed to load image: ${url}`));
        img.src = url;
      });
    }

    function getImageData(img) {
      analysisCanvas.width = img.naturalWidth;
      analysisCanvas.height = img.naturalHeight;
      ctx.clearRect(0, 0, img.naturalWidth, img.naturalHeight);
      ctx.drawImage(img, 0, 0);
      try {
        return ctx.getImageData(0, 0, img.naturalWidth, img.naturalHeight);
      } catch (err) {
        // CORS-tainted canvas — return blank ImageData as fallback
        return new ImageData(img.naturalWidth || 1, img.naturalHeight || 1);
      }
    }

    function calculateDensity(imageData) {
      const { data, width, height } = imageData;
      const total = width * height;
      if (total === 0) return 0;

      let weighted = 0;
      for (let i = 0; i < data.length; i += 4) {
        const alpha = data[i + 3];
        if (alpha > 0) weighted += alpha / 255;
      }
      return weighted / total;
    }

    function detectContentBounds(imageData) {
      const { data, width, height } = imageData;
      let top = height, bottom = 0, left = width, right = 0;
      let hasContent = false;

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const alpha = data[(y * width + x) * 4 + 3];
          if (alpha > 10) {
            hasContent = true;
            if (y < top) top = y;
            if (y > bottom) bottom = y;
            if (x < left) left = x;
            if (x > right) right = x;
          }
        }
      }

      if (!hasContent) {
        return { top: 0, right: width - 1, bottom: height - 1, left: 0, width, height };
      }

      return { top, right, bottom, left, width: right - left + 1, height: bottom - top + 1 };
    }

    function calculateVisualCenter(imageData) {
      const { data, width, height } = imageData;
      const geoX = width / 2, geoY = height / 2;
      const maxDist = Math.sqrt(3 * 255 * 255);
      let totalWeight = 0, wX = 0, wY = 0;

      for (let y = 0; y < height; y++) {
        for (let x = 0; x < width; x++) {
          const idx = (y * width + x) * 4;
          const r = data[idx], g = data[idx + 1], b = data[idx + 2], a = data[idx + 3];
          if (a === 0) continue;
          const cd = Math.sqrt(r * r + g * g + b * b) / maxDist;
          const w = Math.sqrt(cd) * (a / 255);
          wX += x * w;
          wY += y * w;
          totalWeight += w;
        }
      }

      if (totalWeight === 0) return { x: geoX, y: geoY, offsetX: 0, offsetY: 0 };

      const vx = wX / totalWeight, vy = wY / totalWeight;
      return { x: vx, y: vy, offsetX: vx - geoX, offsetY: vy - geoY };
    }

    function calculateNormalizedWidth(aspectRatio, scaleFactor, baseSize) {
      if (aspectRatio <= 0) return baseSize;
      return baseSize * Math.pow(aspectRatio, scaleFactor);
    }

    function applyDensityCompensation(size, density, meanDensity, densityFactor) {
      if (densityFactor === 0 || meanDensity === 0 || density === 0) return size;
      const ratio = meanDensity / density;
      return size * Math.pow(ratio, densityFactor * 0.5);
    }

    async function analyzeLogo(domain, token, config) {
      const url = buildLogoUrl(domain, token, config);

      // Check cache — reuse analysis if same URL already fetched
      if (logoCache.has(url)) {
        const cached = logoCache.get(url);
        const normalizedWidth = calculateNormalizedWidth(cached.aspectRatio, config.scaleFactor, config.baseSize);
        return {
          ...cached,
          normalizedWidth,
          normalizedHeight: normalizedWidth / Math.max(cached.aspectRatio, 0.01),
        };
      }

      try {
        const img = await loadImage(url);
        const imageData = getImageData(img);
        const density = calculateDensity(imageData);
        const bounds = detectContentBounds(imageData);
        const center = calculateVisualCenter(imageData);
        const aspectRatio = bounds.width / Math.max(bounds.height, 1);

        const normalizedWidth = calculateNormalizedWidth(
          aspectRatio,
          config.scaleFactor,
          config.baseSize,
        );
        const normalizedHeight = normalizedWidth / Math.max(aspectRatio, 0.01);

        const result = {
          domain,
          url,
          naturalWidth: img.naturalWidth,
          naturalHeight: img.naturalHeight,
          aspectRatio,
          density,
          contentBounds: bounds,
          visualCenter: center,
          normalizedWidth,
          normalizedHeight,
        };

        // Cache the analysis (keyed by URL)
        logoCache.set(url, result);
        return result;
      } catch (err) {
        // Return fallback analysis for failed images
        return {
          domain,
          url,
          naturalWidth: 128,
          naturalHeight: 128,
          aspectRatio: 1,
          density: 0.5,
          contentBounds: { top: 0, right: 127, bottom: 127, left: 0, width: 128, height: 128 },
          visualCenter: { x: 64, y: 64, offsetX: 0, offsetY: 0 },
          normalizedWidth: config.baseSize,
          normalizedHeight: config.baseSize,
        };
      }
    }

    // ============================
    // Main Generate Flow
    // ============================

    async function handleGenerate() {
      const token = tokenInput.value.trim();
      if (!token) {
        setStatus('Please enter an API token', 'error');
        return;
      }

      if (domains.length === 0) {
        setStatus('Please enter at least one domain', 'error');
        return;
      }

      const config = getConfig();

      generateBtn.disabled = true;
      generateBtn.classList.add('loading');
      generateBtn.textContent = 'Generating...';
      setStatus(`Analyzing ${domains.length} logos...`);
      setProgress(0, domains.length);

      try {
        // Phase 1: Analyze all logos in UI via canvas
        const logos = [];
        for (let i = 0; i < domains.length; i++) {
          setStatus(`Analyzing ${domains[i]}...`);
          setProgress(i, domains.length);
          const analysis = await analyzeLogo(domains[i], token, config);
          logos.push(analysis);
        }

        // Phase 2: Apply density compensation across all logos
        if (config.densityAware) {
          const densities = logos.map(l => l.density);
          const meanDensity = densities.reduce((a, b) => a + b, 0) / densities.length;

          for (const logo of logos) {
            logo.normalizedWidth = applyDensityCompensation(
              logo.normalizedWidth,
              logo.density,
              meanDensity,
              config.densityFactor,
            );
            logo.normalizedHeight = logo.normalizedWidth / Math.max(logo.aspectRatio, 0.01);
          }
        }

        setStatus('Generating grid on canvas...');
        setProgress(domains.length, domains.length);

        // Phase 3: Send to plugin sandbox for Figma canvas generation
        const canvasLogosToSend = domains
          .filter(function(d) { return canvasLogoMap.has(d); })
          .map(function(d) { return canvasLogoMap.get(d); });
        const logosToFetch = logos.filter(function(l) { return !canvasLogoMap.has(l.domain); });

        parent.postMessage({
          pluginMessage: {
            type: 'generate-grid',
            config: config,
            logos: logosToFetch,
            canvasLogos: canvasLogosToSend,
            appendToExisting: appendToExisting,
          },
        }, '*');
      } catch (err) {
        setStatus(`Error: ${err.message}`, 'error');
        generateBtn.disabled = false;
        generateBtn.classList.remove('loading');
        generateBtn.textContent = 'Generate Logo Soup';
        setProgress(0, 0);
      }
    }

    // ============================
    // Event Listeners
    // ============================

    saveTokenBtn.onclick = () => {
      const token = tokenInput.value.trim();
      if (!token) {
        tokenStatus.textContent = 'Token cannot be empty';
        tokenStatus.className = 'status error';
        return;
      }
      if (!token.startsWith('pk_')) {
        tokenStatus.textContent = 'Token must start with pk_';
        tokenStatus.className = 'status error';
        return;
      }
      parent.postMessage({ pluginMessage: { type: 'save-token', token } }, '*');
      tokenStatus.textContent = 'Token saved';
      tokenStatus.className = 'status success';
      setTimeout(() => { tokenStatus.textContent = ''; }, 2000);
    };

    addDomainBtn.onclick = () => {
      const val = addDomainInput.value.trim();
      if (val) {
        // Support comma/newline-separated bulk add
        const newDomains = parseDomains(val);
        newDomains.forEach(d => addDomain(d));
        addDomainInput.value = '';
      }
    };

    addDomainInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        addDomainBtn.click();
      }
    });

    addPopularBtn.onclick = () => {
      const top8 = POPULAR_LOGOS.slice(0, 8);
      top8.forEach(d => addDomain(d));
    };

    clearAllBtn.onclick = () => {
      domains = [];
      canvasLogoMap.clear();
      renderDomainList();
    };

    // Numeric input validation on blur — clamp to min/max
    [columnsInput, baseSizeInput, gapInput, scaleFactorInput, densityFactorInput].forEach(input => {
      input.addEventListener('blur', () => {
        const min = parseFloat(input.min);
        const max = parseFloat(input.max);
        let val = parseFloat(input.value);
        if (isNaN(val)) val = min;
        if (val < min) val = min;
        if (val > max) val = max;
        input.value = val;
      });
    });

    generateBtn.onclick = handleGenerate;

    // Handle messages from plugin sandbox
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      switch (msg.type) {
        case 'token-loaded':
          if (msg.token) {
            tokenInput.value = msg.token;
            tokenStatus.textContent = 'Token loaded';
            tokenStatus.className = 'status success';
            setTimeout(() => { tokenStatus.textContent = ''; }, 2000);
          }
          break;

        case 'selection-detected': {
          const { logos, hasExistingGrid } = msg;
          if (logos.length > 0) {
            logos.forEach((logo, index) => {
              const key = logo.domain === 'unknown' ? 'unknown-' + index : logo.domain;
              const logoWithKey = Object.assign({}, logo, { domain: key });
              if (!domains.includes(key)) {
                canvasLogoMap.set(key, logoWithKey);
                domains.unshift(key);
              }
            });
            renderDomainList();
            showSelectionBanner(logos.length);
          }
          if (logos.length > 0 || hasExistingGrid) {
            appendToExisting = hasExistingGrid;
            renderAppendToggle();
          }
          break;
        }

        case 'progress':
          setStatus(`Placing ${msg.domain} (${msg.current}/${msg.total})...`);
          setProgress(msg.current, msg.total);
          break;

        case 'complete':
          setStatus('Logo Soup generated!', 'success');
          setProgress(0, 0);
          generateBtn.disabled = false;
          generateBtn.classList.remove('loading');
          generateBtn.textContent = 'Generate Logo Soup';
          break;

        case 'error':
          setStatus(`Error: ${msg.message}`, 'error');
          setProgress(0, 0);
          generateBtn.disabled = false;
          generateBtn.classList.remove('loading');
          generateBtn.textContent = 'Generate Logo Soup';
          break;
      }
    };

    // Initialize empty domain list
    renderDomainList();

    // Request stored token on load
    parent.postMessage({ pluginMessage: { type: 'load-token' } }, '*');
  </script>
</body>
</html>
