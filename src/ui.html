<!DOCTYPE html>
<html>
<head>
  <style>
    /* Figma-native theming via CSS variables provided by themeColors: true */
    :root {
      --spacing-xs: 4px;
      --spacing-sm: 8px;
      --spacing-md: 12px;
      --spacing-lg: 16px;
      --radius: 6px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 11px;
      color: var(--figma-color-text, #333);
      background: var(--figma-color-bg, #fff);
      padding: var(--spacing-lg);
      line-height: 1.5;
      overflow-y: auto;
    }

    h2 {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: var(--spacing-sm);
      color: var(--figma-color-text, #333);
    }

    .section {
      margin-bottom: var(--spacing-lg);
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--spacing-sm);
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      margin-bottom: var(--spacing-xs);
      color: var(--figma-color-text-secondary, #666);
    }

    input[type="text"],
    input[type="number"],
    textarea,
    select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid var(--figma-color-border, #ddd);
      border-radius: var(--radius);
      background: var(--figma-color-bg, #fff);
      color: var(--figma-color-text, #333);
      font-size: 11px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--figma-color-border-brand, #18a0fb);
    }

    textarea {
      resize: vertical;
      min-height: 72px;
    }

    .row {
      display: flex;
      gap: var(--spacing-sm);
    }

    .row > * {
      flex: 1;
    }

    .field {
      margin-bottom: var(--spacing-md);
    }

    button {
      padding: 8px 16px;
      border: none;
      border-radius: var(--radius);
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      width: 100%;
      background: var(--figma-color-bg-brand, #18a0fb);
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      opacity: 0.9;
    }

    .btn-secondary {
      background: var(--figma-color-bg-secondary, #f0f0f0);
      color: var(--figma-color-text, #333);
      font-weight: 500;
      padding: 4px 8px;
      font-size: 10px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-sm);
    }

    .checkbox-row input[type="checkbox"] {
      width: auto;
    }

    .checkbox-row label {
      margin: 0;
      cursor: pointer;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--figma-color-bg-secondary, #f0f0f0);
      border-radius: 2px;
      margin-top: var(--spacing-sm);
      overflow: hidden;
      display: none;
    }

    .progress-bar.visible {
      display: block;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--figma-color-bg-brand, #18a0fb);
      border-radius: 2px;
      transition: width 0.2s ease;
      width: 0%;
    }

    .status {
      font-size: 10px;
      color: var(--figma-color-text-secondary, #666);
      margin-top: var(--spacing-xs);
      min-height: 16px;
    }

    .status.error {
      color: var(--figma-color-text-danger, #f24822);
    }

    .status.success {
      color: var(--figma-color-text-success, #1bc47d);
    }

    .divider {
      border: none;
      border-top: 1px solid var(--figma-color-border, #eee);
      margin: var(--spacing-lg) 0;
    }

    .hidden {
      display: none;
    }

    /* Domain list items for drag-to-reorder */
    .domain-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-bottom: var(--spacing-sm);
    }

    .domain-item {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 6px;
      background: var(--figma-color-bg-secondary, #f5f5f5);
      border-radius: 4px;
      font-size: 11px;
      cursor: grab;
      user-select: none;
      transition: background 0.1s;
    }

    .domain-item:active {
      cursor: grabbing;
    }

    .domain-item.dragging {
      opacity: 0.5;
      background: var(--figma-color-bg-hover, #e8e8e8);
    }

    .domain-item.drag-over {
      border-top: 2px solid var(--figma-color-border-brand, #18a0fb);
    }

    .domain-item .drag-handle {
      color: var(--figma-color-text-tertiary, #aaa);
      font-size: 10px;
      flex-shrink: 0;
    }

    .domain-item .domain-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .domain-item .remove-btn {
      background: none;
      border: none;
      color: var(--figma-color-text-tertiary, #aaa);
      cursor: pointer;
      padding: 0 2px;
      font-size: 12px;
      line-height: 1;
      flex-shrink: 0;
    }

    .domain-item .remove-btn:hover {
      color: var(--figma-color-text-danger, #f24822);
    }

    /* Loading spinner on generate button */
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-primary.loading {
      position: relative;
      pointer-events: none;
    }

    .btn-primary.loading::after {
      content: "";
      width: 12px;
      height: 12px;
      margin-left: 8px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      display: inline-block;
      vertical-align: middle;
      animation: spin 0.6s linear infinite;
    }

    /* Tooltip icon for advanced fields */
    .tooltip {
      display: inline-block;
      width: 14px;
      height: 14px;
      line-height: 14px;
      text-align: center;
      border-radius: 50%;
      background: var(--figma-color-bg-secondary, #eee);
      color: var(--figma-color-text-tertiary, #999);
      font-size: 9px;
      cursor: help;
      margin-left: 4px;
      vertical-align: middle;
    }

    /* Domain list empty state */
    .domain-list-empty {
      padding: 12px;
      text-align: center;
      color: var(--figma-color-text-tertiary, #aaa);
      font-size: 10px;
    }
  </style>
</head>
<body>
  <!-- Domains Section -->
  <div class="section">
    <div class="section-header">
      <h2>Logos</h2>
      <button class="btn-secondary" id="clear-all-btn">Clear</button>
    </div>
    <div class="field">
      <label>Domains</label>
      <div class="domain-list" id="domain-list" role="list" aria-label="Domain list">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

  <hr class="divider" />

  <!-- Grid Config Section -->
  <div class="section">
    <h2>Grid Settings</h2>
    <div class="row">
      <div class="field">
        <label for="columns-input">Columns</label>
        <input type="number" id="columns-input" value="4" min="1" max="20" />
      </div>
      <div class="field">
        <label for="base-size-input">Base Size (px)</label>
        <input type="number" id="base-size-input" value="48" min="16" max="200" />
      </div>
      <div class="field">
        <label for="gap-input">Gap (px)</label>
        <input type="number" id="gap-input" value="16" min="0" max="100" />
      </div>
    </div>
  </div>

  <!-- Normalization Options -->
  <div class="section">
    <h2>Normalization</h2>
    <div class="row">
      <div class="field">
        <label for="scale-factor-input">Scale Factor <span class="tooltip" title="0 = same width, 1 = same height, 0.5 = balanced">?</span></label>
        <input type="number" id="scale-factor-input" value="0.5" min="0" max="1" step="0.1" />
      </div>
    </div>
  </div>

  <!-- Output Options -->
  <div class="section">
    <h2>Output</h2>
    <div class="checkbox-row">
      <input type="checkbox" id="export-component-check" />
      <label for="export-component-check">Export as Figma Component</label>
    </div>
  </div>

  <hr class="divider" />

  <!-- Generate Button -->
  <button class="btn-primary" id="generate-btn">Generate Logo Soup</button>
  <div class="progress-bar" id="progress-bar">
    <div class="progress-bar-fill" id="progress-fill"></div>
  </div>
  <div class="status" id="status-text" role="status" aria-live="polite"></div>

  <script>
    // ============================
    // DOM References
    // ============================
    const domainList = document.getElementById('domain-list');
    const clearAllBtn = document.getElementById('clear-all-btn');
    const columnsInput = document.getElementById('columns-input');
    const baseSizeInput = document.getElementById('base-size-input');
    const gapInput = document.getElementById('gap-input');
    const scaleFactorInput = document.getElementById('scale-factor-input');
    const exportComponentCheck = document.getElementById('export-component-check');
    const generateBtn = document.getElementById('generate-btn');
    const progressBar = document.getElementById('progress-bar');
    const progressFill = document.getElementById('progress-fill');
    const statusText = document.getElementById('status-text');

    // Domain list state
    let domains = [];
    const canvasLogoMap = new Map(); // domain → CanvasLogo metadata
    let appendToExisting = false;

    // ============================
    // Domain List Management
    // ============================

    function showSelectionBanner(count) {
      const existing = document.getElementById('selection-banner');
      if (existing) existing.remove();

      const banner = document.createElement('div');
      banner.id = 'selection-banner';
      banner.style.cssText = [
        'background:var(--figma-color-bg-selected,#e8f0fe)',
        'color:var(--figma-color-text,#333)',
        'padding:8px 12px',
        'font-size:11px',
        'border-radius:4px',
        'margin-bottom:8px',
        'display:flex',
        'justify-content:space-between',
        'align-items:center',
      ].join(';');

      const text = document.createElement('span');
      text.textContent = count + ' logo' + (count === 1 ? '' : 's') + ' imported from canvas selection';

      const dismiss = document.createElement('button');
      dismiss.textContent = '\u2715';
      dismiss.setAttribute('aria-label', 'Dismiss');
      dismiss.style.cssText = 'background:none;border:none;cursor:pointer;font-size:12px;padding:0 0 0 8px;';
      dismiss.addEventListener('click', function() { banner.remove(); });

      banner.appendChild(text);
      banner.appendChild(dismiss);

      const domainSection = document.querySelector('.section-domains') || document.getElementById('domain-list');
      if (domainSection && domainSection.parentNode) {
        domainSection.parentNode.insertBefore(banner, domainSection);
      }
    }

    function renderAppendToggle() {
      let toggle = document.getElementById('append-toggle');
      if (!toggle) {
        toggle = document.createElement('div');
        toggle.id = 'append-toggle';
        toggle.setAttribute('role', 'group');
        toggle.setAttribute('aria-label', 'Grid placement');
        toggle.style.cssText = 'display:flex;gap:6px;margin-bottom:8px;';
        const generateBtn = document.getElementById('generate-btn');
        if (generateBtn && generateBtn.parentNode) {
          generateBtn.parentNode.insertBefore(toggle, generateBtn);
        }
      }
      while (toggle.firstChild) toggle.removeChild(toggle.firstChild);

      function makeBtn(label, isAppend) {
        const btn = document.createElement('button');
        btn.textContent = label;
        const active = isAppend === appendToExisting;
        btn.style.cssText = [
          'flex:1',
          'padding:4px 8px',
          'border-radius:4px',
          'cursor:pointer',
          'font-size:11px',
          'border:1px solid var(--figma-color-border,#ccc)',
          'background:' + (active ? 'var(--figma-color-bg-selected,#e8f0fe)' : 'var(--figma-color-bg,#fff)'),
          'font-weight:' + (active ? '600' : '400'),
        ].join(';');
        btn.addEventListener('click', function() {
          appendToExisting = isAppend;
          renderAppendToggle();
        });
        return btn;
      }

      toggle.appendChild(makeBtn('New grid', false));
      toggle.appendChild(makeBtn('Append to existing', true));
    }

    function renderDomainList() {
      domainList.textContent = '';

      if (domains.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'domain-list-empty';
        empty.textContent = 'Select logos on the Figma canvas to get started';
        domainList.appendChild(empty);
        return;
      }

      domains.forEach((domain, index) => {
        const item = document.createElement('div');
        item.className = 'domain-item';
        item.draggable = true;
        item.setAttribute('role', 'listitem');
        item.setAttribute('tabindex', '0');
        item.setAttribute('aria-label', domain + ', drag to reorder');
        item.dataset.index = String(index);

        const handle = document.createElement('span');
        handle.className = 'drag-handle';
        handle.textContent = '\u2630';
        handle.setAttribute('aria-hidden', 'true');

        const name = document.createElement('span');
        name.className = 'domain-name';

        if (canvasLogoMap.has(domain)) {
          const badge = document.createElement('span');
          badge.textContent = '\u229e';
          badge.title = 'From canvas selection \u2014 no API key needed';
          badge.setAttribute('aria-label', 'Canvas logo');
          badge.style.cssText = 'font-size:9px;opacity:0.55;margin-right:4px;';
          name.insertBefore(badge, name.firstChild);
        }

        name.appendChild(document.createTextNode(domain));

        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove-btn';
        removeBtn.textContent = '\u00d7';
        removeBtn.setAttribute('aria-label', 'Remove ' + domain);
        removeBtn.dataset.index = String(index);

        item.appendChild(handle);
        item.appendChild(name);
        item.appendChild(removeBtn);

        // Drag events
        item.addEventListener('dragstart', (e) => {
          item.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', String(index));
        });
        item.addEventListener('dragend', () => {
          item.classList.remove('dragging');
          domainList.querySelectorAll('.domain-item').forEach(el =>
            el.classList.remove('drag-over')
          );
        });
        item.addEventListener('dragover', (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          item.classList.add('drag-over');
        });
        item.addEventListener('dragleave', () => {
          item.classList.remove('drag-over');
        });
        item.addEventListener('drop', (e) => {
          e.preventDefault();
          item.classList.remove('drag-over');
          const fromIndex = parseInt(e.dataTransfer.getData('text/plain'));
          const toIndex = index;
          if (fromIndex !== toIndex) {
            const [moved] = domains.splice(fromIndex, 1);
            domains.splice(toIndex, 0, moved);
            renderDomainList();
          }
        });

        // Remove button
        removeBtn.addEventListener('click', () => {
          canvasLogoMap.delete(domain);
          domains.splice(index, 1);
          renderDomainList();
        });

        // Keyboard: Delete/Backspace to remove, arrow keys to navigate
        item.addEventListener('keydown', (e) => {
          if (e.key === 'Delete' || e.key === 'Backspace') {
            e.preventDefault();
            canvasLogoMap.delete(domain);
            domains.splice(index, 1);
            renderDomainList();
            // Focus next item or input
            const nextItem = domainList.querySelector('.domain-item');
            if (nextItem) nextItem.focus();
          } else if (e.key === 'ArrowDown' && index < domains.length - 1) {
            e.preventDefault();
            const items = domainList.querySelectorAll('.domain-item');
            if (items[index + 1]) items[index + 1].focus();
          } else if (e.key === 'ArrowUp' && index > 0) {
            e.preventDefault();
            const items = domainList.querySelectorAll('.domain-item');
            if (items[index - 1]) items[index - 1].focus();
          }
        });

        domainList.appendChild(item);
      });
    }

    // ============================
    // Utility Functions
    // ============================

    function getConfig() {
      return {
        columns: parseInt(columnsInput.value) || 4,
        baseSize: parseInt(baseSizeInput.value) || 48,
        gap: parseInt(gapInput.value) || 16,
        scaleFactor: parseFloat(scaleFactorInput.value) || 0.5,
        exportAsComponent: exportComponentCheck.checked,
      };
    }

    function setStatus(text, type = '') {
      statusText.textContent = text;
      statusText.className = 'status' + (type ? ` ${type}` : '');
    }

    function setProgress(current, total) {
      if (total === 0) {
        progressBar.classList.remove('visible');
        return;
      }
      progressBar.classList.add('visible');
      const pct = Math.round((current / total) * 100);
      progressFill.style.width = `${pct}%`;
    }

    // ============================
    // Main Generate Flow
    // ============================

    function handleGenerate() {
      const canvasLogos = Array.from(canvasLogoMap.values());

      if (canvasLogos.length === 0) {
        setStatus('Select logos on the Figma canvas to get started', 'error');
        return;
      }

      const config = getConfig();

      generateBtn.disabled = true;
      generateBtn.classList.add('loading');
      generateBtn.textContent = 'Generating...';
      setStatus('Generating grid on canvas...');

      parent.postMessage({
        pluginMessage: {
          type: 'generate-grid',
          config,
          canvasLogos,
          appendToExisting,
        },
      }, '*');
    }

    // ============================
    // Event Listeners
    // ============================

    clearAllBtn.onclick = () => {
      domains = [];
      canvasLogoMap.clear();
      renderDomainList();
    };

    // Numeric input validation on blur — clamp to min/max
    [columnsInput, baseSizeInput, gapInput, scaleFactorInput].forEach(input => {
      input.addEventListener('blur', () => {
        const min = parseFloat(input.min);
        const max = parseFloat(input.max);
        let val = parseFloat(input.value);
        if (isNaN(val)) val = min;
        if (val < min) val = min;
        if (val > max) val = max;
        input.value = val;
      });
    });

    generateBtn.onclick = handleGenerate;

    // Handle messages from plugin sandbox
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      switch (msg.type) {
        case 'selection-detected': {
          const { logos, hasExistingGrid } = msg;
          if (logos.length > 0) {
            logos.forEach((logo, index) => {
              const key = logo.domain === 'unknown' ? 'unknown-' + index : logo.domain;
              const logoWithKey = Object.assign({}, logo, { domain: key });
              if (!domains.includes(key)) {
                canvasLogoMap.set(key, logoWithKey);
                domains.unshift(key);
              }
            });
            renderDomainList();
            showSelectionBanner(logos.length);
          }
          if (logos.length > 0 || hasExistingGrid) {
            appendToExisting = hasExistingGrid;
            renderAppendToggle();
          }
          break;
        }

        case 'progress':
          setStatus(`Placing ${msg.domain} (${msg.current}/${msg.total})...`);
          setProgress(msg.current, msg.total);
          break;

        case 'complete':
          setStatus('Logo Soup generated!', 'success');
          setProgress(0, 0);
          generateBtn.disabled = false;
          generateBtn.classList.remove('loading');
          generateBtn.textContent = 'Generate Logo Soup';
          break;

        case 'error':
          setStatus(`Error: ${msg.message}`, 'error');
          setProgress(0, 0);
          generateBtn.disabled = false;
          generateBtn.classList.remove('loading');
          generateBtn.textContent = 'Generate Logo Soup';
          break;
      }
    };

    // Initialize empty domain list
    renderDomainList();
  </script>
</body>
</html>
